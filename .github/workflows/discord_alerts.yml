name: Unergy — Discord Obligation Alerts

on:
  schedule:
    - cron: "35 2 * * *"   # 9:21 PM Colombia (UTC-5 → 02:21 UTC)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Enviar alerta de prueba (true/false)"
        required: false
        default: "false"

jobs:
  send-alerts:
    name: Check due dates and send Discord alerts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run alert dispatcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python discord_alerts.py --test
          else
            python discord_alerts.py
          fi
